function useInView(threshold = 0.2) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setInView(true);
          observer.disconnect();
        }
      },
      { threshold }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, [threshold]);

  return [ref, inView];
}

function Reveal({ children, delay = 0, className = '' }) {
  const [ref, inView] = useInView();
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: inView ? 1 : 0,
        transform: inView ? 'translateY(0)' : 'translateY(24px)',
        transition: `opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${delay}s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${delay}s`,
      }}
    >
      {children}
    </div>
  );
}

          gap: 8px;
          background: transparent;
          color: #1C1B19;
          padding: 15px 30px;
          border-radius: 100px;
          text-decoration: none;
          font-weight: 600;
          font-size: 15px;
          border: 1.5px solid #1C1B19;
          cursor: pointer;
          transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
        }
        .cta-btn-outline:hover {
          transform: translateY(-3px);
          background: #1C1B19;
          color: #FAFAF7;
        }

        .card {
          background: #FFFFFF;
          border-radius: 24px;
          border: 1px solid #EFEAE1;
          box-shadow: 0 2px 8px rgba(28, 27, 25, 0.03);
          transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s ease, border-color 0.35s ease;
        }
        .card:hover {
          transform: translateY(-6px);
          box-shadow: 0 16px 40px rgba(28, 27, 25, 0.08);
          border-color: #E7E2D9;
        }

        .pillar-card {
          background: #26241F;
          padding: 36px 28px;
          height: 100%;
          transition: background 0.35s ease;
        }
        .pillar-card:hover {
          background: #2F2C26;
        }
        .pillar-icon {
          width: 44px;
          height: 44px;
          border-radius: 12px;
          background: rgba(194, 84, 47, 0.18);
          border: 1px solid rgba(194, 84, 47, 0.3);
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 20px;
        }
        .pillar-cell-wrap {
          height: 100%;
        }

        @media (max-width: 768px) {
          #vision > div > div:last-child {
            grid-template-columns: 1fr !important;
          }
        }

        .event-card {
          display: grid;
          grid-template-columns: 90px 1fr auto;
          gap: 24px;
          align-items: center;
          padding: 26px;
          margin-bottom: 14px;
        }
        .date-chip {
          background: #FAFAF7;
          border-radius: 16px;
          padding: 14px 10px;
          text-align: center;
          border: 1px solid #EFEAE1;
        }

        .carousel-track {
          display: flex;
          gap: 20px;
          overflow-x: auto;
          scroll-snap-type: x mandatory;
          padding-bottom: 8px;
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
        .carousel-track::-webkit-scrollbar { display: none; }

        .product-card {
          flex: 0 0 260px;
          scroll-snap-align: start;
        }
        .product-image {
          aspect-ratio: 3 / 4;
          border-radius: 22px;
          overflow: hidden;
          margin-bottom: 16px;
          padding: 0;
        }

        .carousel-nav-btn {
          width: 48px;
          height: 48px;
          border-radius: 50%;
          background: #FFFFFF;
          border: 1px solid #EFEAE1;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          transition: background 0.25s ease, transform 0.2s ease, border-color 0.25s ease;
          flex-shrink: 0;
        }
        .carousel-nav-btn:hover {
          background: #1C1B19;
          border-color: #1C1B19;
          transform: scale(1.05);
        }
        .carousel-nav-btn:hover svg {
          stroke: #FAFAF7;
        }

        @media (max-width: 640px) {
          .event-card {
            grid-template-columns: 70px 1fr;
            row-gap: 12px;
            padding: 20px;
          }
          .event-status { grid-column: 2; justify-self: start !important; }
          .hero-buttons {
            flex-direction: column;
            width: 100%;

          .hero-buttons a, .hero-buttons button {
            width: 100%;
            justify-content: center;

          width: auto;

          width: auto;
          object-fit: contain;

          position: absolute;
          width: 600px;
          height: 600px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(194, 84, 47, 0.08) 0%, transparent 70%);
          pointer-events: none;

          inset: 0;

                    <div className="pillar-icon">
                      <Icon size={20} color="#C2542F" />

                    <h3 className="display" style={{ fontSize: 18, fontWeight: 700, margin: '0 0 8px' }}>

        </div>
      </section>

      {/* Eventos */}
      <section id="eventos" style={{ position: 'relative' }}>

            <p className="body-text" style={{ fontSize: 16, color: '#6B6560', maxWidth: 480, marginBottom: 56, lineHeight: 1.6 }}>

          <div>
            {EVENTS.map((event, i) => (

                    <div className="display" style={{ fontSize: 26, fontWeight: 800, lineHeight: 1, color: '#1C1B19' }}>

                    <div className="mono" style={{ fontSize: 11, color: '#A39A8F', marginTop: 4 }}>{event.month}</div>

                  <div>
                    <h3 className="display" style={{ fontSize: 19, fontWeight: 700, margin: '0 0 8px' }}>
                      {event.title}

                      <span className="mono">{event.time}</span>

                  <div
                    className="event-status mono"
                    style={{
                      fontSize: 11,
                      textTransform: 'uppercase',
                      padding: '7px 16px',
                      borderRadius: 100,
                      background: event.status === 'Confirmado' ? 'rgba(194, 84, 47, 0.1)' : '#FAFAF7',
                      border: '1px solid',
                      borderColor: event.status === 'Confirmado' ? 'rgba(194, 84, 47, 0.3)' : '#EFEAE1',
                      color: event.status === 'Confirmado' ? '#C2542F' : '#A39A8F',
                      whiteSpace: 'nowrap',
                      justifySelf: 'end',
                      fontWeight: 700,
                    }}
                  >
                    {event.status}
                  </div>
                </div>
              </Reveal>

        </div>
      </section>

      {/* Ropa */}
      <section id="ropa" style={{ background: '#F3EFE7', position: 'relative', overflow: 'hidden' }}>
        <div style={{ maxWidth: 1140, margin: '0 auto', padding: '120px 24px' }}>

            <div

              <button className="carousel-nav-btn" onClick={() => scrollCarousel(1)} aria-label="Siguiente">
                <ArrowRight size={18} stroke="#1C1B19" />

}
